<!doctype html>
<html lang="de">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BurgerHouse – BestellApp</title>
        <link rel="icon" type="image/png" href="./assets/icon/orders.png" />

        <link rel="stylesheet" href="Style/standard.css" />
        <link rel="stylesheet" href="Style/fonts.css" />
        <link rel="stylesheet" href="Style/layout.css" />
        <link rel="stylesheet" href="Style/header.css" />
        <link rel="stylesheet" href="Style/menu.css" />
        <link rel="stylesheet" href="Style/cart.css" />
        <link rel="stylesheet" href="Style/mobile.css" />
    </head>

    <body>

        <header id="topHeader">
            <img
                src="./assets/icon/menu-icon-white.png"
                alt="menu_icon_white"
            />
            <img
                id="menuIcon"
                src="./assets/icon/menu.png"
                alt="menu_icon_dark"
            />
        </header>


        <section id="hero">
            <div id="hero-content">
                <img
                    id="burger-logo"
                    src="./assets/icon/main-icon.png"
                    alt="mainBurgerIcon"
                />
            </div>
        </section>


        <section id="restaurantHeader">
            <div id="restaurantHeaderContent">
                <div id="restaurantInfo">
                    <img
                        src="./assets/icon/burgerHouseLogo.png"
                        alt="burgerHouseLogo"
                    />
                    <img
                        src="./assets/icon/rating-icon.png"
                        alt="rating-icon"
                    />
                </div>
                <p class="restaurantTagline">
                    The best of Burgers, Pizza, and Greens, all in one great
                    place.
                </p>
            </div>
        </section>


        <div id="categoryHeaderContainer"></div>


        <main>
            <div id="layout">
                <section id="sectionMenu"></section>
                <div id="basketWrapper"></div>
            </div>
        </main>

        <footer>
            <p>
                <span>© 2026 BurgerHouse</span>
                <span>Imprint</span>
                <span>Cookie References</span>
            </p>
        </footer>

        <nav id="mobileNav" aria-label="Mobile navigation">
            <a href="#topHeader" aria-label="Home">
                <img src="./assets/icon/home-icon-white.png" alt="" />
            </a>
            <a href="#restaurantHeader" aria-label="Profile">
                <img src="./assets/icon/person-icon-white.png" alt="" />
            </a>
            <a href="#sectionMenu" aria-label="Menu">
                <img src="./assets/icon/orders.png" alt="" />
            </a>
        </nav>

        <div id="orderOverlay" class="hidden">
            <div id="orderPopup">
                <button id="closeOrderPopup" type="button">×</button>
                <img
                    src="./assets/icon/delivery-truck-icon.png"
                    alt="delivery"
                />
                <h2>Order confirmed!</h2>
                <p>Your food is on the way!</p>
            </div>
        </div>

        <script type="module" src="script/app.js"></script>
    </body>
</html>
